syntax = "proto3";

package betterglobekey.control.v1;

option go_package = "github.com/Serpentiel/betterglobekey/internal/gen/betterglobekey/control/v1;controlv1";

// ConfigService lets a local companion application read and update the daemon's
// configuration and inspect the system's input sources. It is served over a
// Unix domain socket in the user's home directory and is intended for local,
// single-user use only.
service ConfigService {
  // GetConfig returns the daemon's current configuration.
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);

  // ApplyConfig validates and persists a new configuration. The daemon reloads
  // it automatically once it is written.
  rpc ApplyConfig(ApplyConfigRequest) returns (ApplyConfigResponse);

  // ListInputSources returns every selectable input source with its localized
  // name.
  rpc ListInputSources(ListInputSourcesRequest) returns (ListInputSourcesResponse);

  // GetVersion returns the running daemon's version and build commit.
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);

  // GetStatus reports the daemon's runtime state, including whether it holds the
  // Accessibility permission the global event tap requires. Because the daemon
  // answers from its own process, this reflects the daemon's grant rather than
  // that of whatever launched the caller.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

// Config mirrors the daemon's resolved configuration.
message Config {
  // logger holds the logging configuration.
  Logger logger = 1;

  // double_press configures collection switching.
  DoublePress double_press = 2;

  // reverse configures the modifier that inverts a press.
  Reverse reverse = 3;

  // hud configures the on-screen overlay.
  Hud hud = 4;

  // collections are the ordered input source collections the Globe key cycles
  // through.
  repeated Collection collections = 5;
}

// Logger holds the logging configuration.
message Logger {
  // path is the path to the log file.
  string path = 1;

  // level is the minimum level to log: debug, info, warn, or error.
  string level = 2;

  // retention_days is the number of days to retain rotated log files.
  int32 retention_days = 3;

  // retention_files is the number of rotated log files to retain.
  int32 retention_files = 4;
}

// DoublePress configures the double-press (collection switching) gesture.
message DoublePress {
  // enabled turns collection switching on or off.
  bool enabled = 1;

  // maximum_delay is the longest gap between two presses still counted as a
  // double press, as a Go duration string (e.g. "250ms").
  string maximum_delay = 2;
}

// Reverse configures the modifier that inverts a press.
message Reverse {
  // enabled turns the reverse modifier on or off.
  bool enabled = 1;

  // modifier is the key held to reverse a press: shift, option, control, or
  // command.
  string modifier = 2;
}

// Hud configures the on-screen overlay.
message Hud {
  // enabled shows or hides the overlay.
  bool enabled = 1;

  // duration is how long the overlay stays visible, as a Go duration string.
  string duration = 2;

  // show_collection includes the collection name as a subtitle.
  bool show_collection = 3;
}

// Collection is a named, ordered set of input source identifiers.
message Collection {
  // name uniquely identifies the collection.
  string name = 1;

  // sources are the input source identifiers, in cycling order.
  repeated string sources = 2;
}

// InputSource is a selectable input source and its localized display name.
message InputSource {
  // id is the input source identifier (e.g. "com.apple.keylayout.US").
  string id = 1;

  // name is the localized display name.
  string name = 2;
}

message GetConfigRequest {}

message GetConfigResponse {
  Config config = 1;
}

message ApplyConfigRequest {
  Config config = 1;
}

message ApplyConfigResponse {}

message ListInputSourcesRequest {}

message ListInputSourcesResponse {
  repeated InputSource sources = 1;
}

message GetVersionRequest {}

message GetVersionResponse {
  // version is the release version, or "dev" for unversioned builds.
  string version = 1;

  // commit is the build's git commit, when embedded.
  string commit = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  // accessibility_trusted reports whether the daemon holds the Accessibility
  // permission required by the global event tap.
  bool accessibility_trusted = 1;
}
