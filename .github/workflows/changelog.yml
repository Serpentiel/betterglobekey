name: Changelog

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      !contains(github.event.pull_request.labels.*.name, 'skip workflows') &&
      !contains(github.event.pull_request.labels.*.name, 'no changelog') &&
      !contains(github.event.pull_request.labels.*.name, 'trunk') &&
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require a changie fragment
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          if git diff --name-only --diff-filter=A "origin/$BASE_REF...HEAD" -- '.changes/unreleased/*.yaml' | grep -q .; then
            echo "Changelog entry found."
          else
            echo "::error::No changelog entry found. Run 'changie new' to add one, or apply the 'no changelog' label."
            exit 1
          fi
