name: Changelog

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      !contains(github.event.pull_request.labels.*.name, 'skip workflows') &&
      !contains(github.event.pull_request.labels.*.name, 'no changelog') &&
      !contains(github.event.pull_request.labels.*.name, 'trunk') &&
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
      - name: Install task
        run: |
          go install github.com/go-task/task/v3/cmd/task@v3.51.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Require a changie fragment
        env:
          BASE_REF: ${{ github.base_ref }}
        run: task changelog:verify
