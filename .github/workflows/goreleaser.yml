name: goreleaser

# checkov:skip=CKV_GHA_7:release tag input is required to drive the release flow
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, with or without leading v (e.g. 1.2.3 or v1.2.3)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: goreleaser
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: macos-latest
    timeout-minutes: 30
    environment: release
    steps:
      - name: Mint release-bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.BETTERGLOBEKEY_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.BETTERGLOBEKEY_RELEASE_BOT_PRIVATE_KEY }}
          owner: Serpentiel
          repositories: betterglobekey,homebrew-tools
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - run: git fetch -f -t
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
      - name: Install changie and task
        run: |
          go install github.com/miniscruff/changie@v1.24.2
          go install github.com/go-task/task/v3/cmd/task@v3.51.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - id: release
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          tag="$(task release:normalize-tag)"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::tag $tag already exists" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Build changelog and tag release
        env:
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          BRANCH: ${{ github.ref_name }}
        run: |
          task changelog:batch
          task release:publish
      - name: Build companion
        working-directory: companion
        env:
          VERSION: ${{ steps.release.outputs.version }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm ci
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm run dist
          # The version bump is only needed to stamp the build; revert it so the
          # working tree is clean for goreleaser (which refuses a dirty state).
          git checkout -- package.json package-lock.json
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94
        with:
          version: ~> v2
          args: release --clean --release-notes=.changes/${{ steps.release.outputs.version }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish the changelog as the release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: gh release edit "$TAG" --notes-file ".changes/$VERSION.md"
      - name: Trigger Homebrew tap bump
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          gh api repos/Serpentiel/homebrew-tools/dispatches \
            -f event_type=betterglobekey-release \
            -f "client_payload[version]=$VERSION"
