name: goreleaser

# checkov:skip=CKV_GHA_7:release tag input is required to drive the release flow
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, with or without leading v (e.g. 1.2.3 or v1.2.3)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: goreleaser
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: macos-latest
    timeout-minutes: 30
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - run: git fetch -f -t
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
      - name: Install changie
        run: |
          go install github.com/miniscruff/changie@v1.24.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - id: release
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          tag="v${TAG_INPUT#[vV]}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$'; then
            echo "::error::'$TAG_INPUT' is not a valid semantic version" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::tag $tag already exists" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Build changelog and tag release
        env:
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          changie batch "$VERSION"
          changie merge
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .changes CHANGELOG.md
          git commit -m "chore(release): $TAG"
          git push origin "HEAD:$GITHUB_REF_NAME"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89
        with:
          version: ~> v2
          args: release --clean --release-notes=.changes/${{ steps.release.outputs.version }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
