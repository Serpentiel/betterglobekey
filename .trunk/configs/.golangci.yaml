version: "2"

linters:
  default: none
  enable:
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - forbidigo
    - forcetypeassert
    - funlen
    - gocognit
    - goconst
    - gocyclo
    - gosec
    - govet
    - importas
    - ineffassign
    - lll
    - makezero
    - misspell
    - mnd
    - nakedret
    - nestif
    - nilerr
    - nlreturn
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
    - wsl_v5
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    gocognit:
      min-complexity: 25
    goconst:
      min-len: 2
      min-occurrences: 2
    govet:
      enable:
        - shadow
    lll:
      line-length: 120
      tab-width: 4
  exclusions:
    rules:
      # Tests favour readability over strict magic-number, length, and complexity rules.
      - path: _test\.go
        linters:
          - funlen
          - goconst
          - gocognit
          - gosec
          - mnd

formatters:
  enable:
    - gofmt
    - goimports
