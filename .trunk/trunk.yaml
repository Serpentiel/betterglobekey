# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.26.4
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  # Teach trunk that .m/.mm are Objective-C so clang-format lints them.
  files:
    - name: objective-c
      extensions:
        - m
        - mm
  definitions:
    # We only add CGO_ENABLED=1, everything else is inherited from the default linter configuration.
    - name: golangci-lint2
      environment:
        - name: GOLANGCI_LINT_CACHE
          value: ${cachedir}
        - name: PATH
          list:
            - ${env.PATH}
        - name: GO111MODULE
          value: auto
        - name: SSH_AUTH_SOCK
          optional: true
          value: ${env.SSH_AUTH_SOCK}
        - name: CGO_ENABLED
          value: "1"
    # Scope clang-format to Objective-C/C; protobuf formatting is handled by buf.
    - name: clang-format
      files:
        - objective-c
        - c
        - c++
  enabled:
    - buf-lint@1.71.0
    - stylelint@17.14.0
    - clang-format@16.0.3
    - actionlint@1.7.12
    - checkov@3.3.2
    - git-diff-check
    - gofmt@1.20.4
    - golangci-lint2@2.12.2
    - markdownlint@0.49.0
    - osv-scanner@2.4.0
    - prettier@3.8.4
    - trivy@0.71.2
    - trufflehog@3.95.6
    - yamllint@1.38.0
  ignore:
    - linters:
        - markdownlint
      paths:
        - .github/**
        - CHANGELOG.md
        - LICENSE.md
        - .changes/**
    # companion/proto is a synced copy of the buf module under proto/, not a
    # module itself; lint the source, not the copy.
    - linters:
        - buf-lint
      paths:
        - companion/proto/**
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
