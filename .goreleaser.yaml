version: 2
archives:
  - formats:
      - binary
changelog:
  disable: true
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=1
    goos:
      - darwin
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
universal_binaries:
  - replace: false
release:
  extra_files:
    - glob: ./companion/dist/*.zip
    - glob: ./companion/dist/*.dmg
